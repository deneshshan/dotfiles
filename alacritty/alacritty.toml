[general]
import = ["rose-pine.toml"]

[colors.primary]
foreground = "#5eaeb2"

[colors.cursor]
cursor = "#FF5555"
text = "#181818"

[cursor]
style = { shape = "Block", blinking = "Always" }
blink_interval = 500
thickness = 0.3
unfocused_hollow = true

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Medium"

[window]
decorations = "Buttonless"
padding = { x = 10, y = 10 }
